name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
      - name: Install Playwright + deps
        run: |
          npx playwright install chromium
          npx playwright install-deps chromium
      - name: Start server & run E2E
        shell: bash
        run: |
          echo "Starting server in background..."
          node dist/server.js > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"
          for i in $(seq 1 60); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health 2>/dev/null | grep -q 200; then
              echo "Server ready on attempt $i"
              break
            fi
            sleep 3
          done
          echo "Running E2E tests..."
          npx playwright test --reporter=list 2>&1
          EXIT_CODE=$?
          echo "E2E exit code: $EXIT_CODE"
          kill $SERVER_PID 2>/dev/null || true
          exit $EXIT_CODE
        env:
          CI: true
          NODE_ENV: development
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUNO_API_KEY: ${{ secrets.SUNO_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          VITE_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
      - name: Debug logs
        if: failure()
        shell: bash
        run: |
          echo "=== Server log ==="
          cat /tmp/server.log 2>/dev/null || echo "(empty)"
          echo "=== Playwright report ==="
          ls -la playwright-report/ 2>/dev/null || echo "(empty)"
