name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
      - name: Install Playwright browsers + deps
        run: |
          npx playwright install chromium
          npx playwright install-deps chromium
      - name: Start server in background
        shell: bash
        run: |
          echo "Starting server..."
          NODE_ENV=production npm run dev > /tmp/server.log 2>&1 &
          echo "Server PID: $!"
          echo "Waiting for server..."
          for i in $(seq 1 60); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health 2>/dev/null | grep -q 200; then
              echo "Server ready on attempt $i"
              break
            fi
            sleep 3
          done
          curl -s http://localhost:3000/health
          echo ""
          echo "Server test complete"
      - name: Run E2E tests
        shell: bash
        run: npx playwright test --reporter=list 2>&1
        env:
          CI: true
          NODE_ENV: development
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUNO_API_KEY: ${{ secrets.SUNO_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          VITE_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
      - name: Show debug output on failure
        if: failure()
        shell: bash
        run: |
          echo "::group::Server log"
          tail -50 /tmp/server.log 2>/dev/null || echo "No server log"
          echo "::endgroup::"
          echo "::group::Node processes & port"
          ps aux | grep -E "node|tsx" | grep -v grep || echo "No node processes"
          ss -tlnp 2>/dev/null | grep 3000 || echo "Port 3000 not in use"
          echo "::endgroup::"
          echo "::group::Playwright test-results"
          if [ -d "test-results" ]; then
            find test-results -type f 2>/dev/null | while read f; do
              echo "--- $f ---"
              head -50 "$f" 2>/dev/null
            done
          else
            echo "No test-results dir"
          fi
          ls -la playwright-report/ 2>/dev/null || echo "No playwright-report dir"
          echo "::endgroup::"
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: debug-logs
          path: |
            /tmp/server.log
            test-results/
            playwright-report/
          if-no-files-found: warn
